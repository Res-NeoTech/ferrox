# Minimal working compose file

server:
  # These ports are default ones if you don't precise them
  http_port: 80
  https_port: 443
  addr: 0.0.0.0
  # Optional: the default timeout is 10
  timeout: 5
  # Optional: router preset: static for classic static file website or spa for apps that use client-side routing (React, Vue.js, Angular, etc.)
  router: static
  # Enable directory indexing
  index: true

# Make sure to create these directories before starting Ferrox
paths:
  serve_dir: www
  log_dir: logs

# Optional: default headers that will be sent everytime
headers:
  X-Content-Type-Options: nosniff
  X-Frame-Options: DENY

# Optional: tls configuration
# Request certificate using certbot for free or generate one yourself using OpenSSL (faster for testing)
tls:
  enabled: true
  cert_path: certs/cert.pem
  key_path: certs/key.pem